<div class="board">
  <div class="todo">
    <div class="header">
      <h3 class="label">todo</h3>
      <button
        class="add-btn"
        (click)="openTaskModal.emit({ mode: TaskActions.CREATE, status: TaskStatus.TODO, task: null })"
      >
        <app-icon-plus />
      </button>
    </div>
    <div
      class="tasks"
      cdkDropList
      id="todo-list"
      [cdkDropListData]="todoTasks()"
      [cdkDropListConnectedTo]="connectedDropLists"
      (cdkDropListDropped)="dropTask($event, TaskStatus.TODO)"
    >
      @for (task of todoTasks(); track task.id) {
      <app-task-card
        [task]="task"
        (edit)="openTaskModal.emit({mode: TaskActions.EDIT, status: TaskStatus.TODO, task})"
        (delete)="removeTask($event)"
      />
      }
    </div>
  </div>
  <div class="progress">
    <div class="header">
      <h3 class="label">progress</h3>
      <button
        class="add-btn"
        (click)="openTaskModal.emit({ mode: TaskActions.CREATE, status: TaskStatus.PROGRESS, task: null })"
      >
        <app-icon-plus />
      </button>
    </div>
    <div
      class="tasks"
      cdkDropList
      id="progress-list"
      [cdkDropListData]="progressTasks()"
      [cdkDropListConnectedTo]="connectedDropLists"
      (cdkDropListDropped)="dropTask($event, TaskStatus.PROGRESS)"
    >
      @for (task of progressTasks(); track task.id) {
      <app-task-card
        [task]="task"
        (edit)="openTaskModal.emit({mode: TaskActions.EDIT, status: TaskStatus.PROGRESS, task})"
        (delete)="removeTask($event)"
      />
      }
    </div>
  </div>
  <div class="done">
    <div class="header">
      <h3 class="label">done</h3>
      <button
        class="add-btn"
        (click)="openTaskModal.emit({ mode: TaskActions.CREATE, status: TaskStatus.DONE, task: null })"
      >
        <app-icon-plus />
      </button>
    </div>
    <div
      class="tasks"
      cdkDropList
      id="done-list"
      [cdkDropListData]="doneTasks()"
      [cdkDropListConnectedTo]="connectedDropLists"
      (cdkDropListDropped)="dropTask($event, TaskStatus.DONE)"
    >
      @for (task of doneTasks(); track task.id) {
      <app-task-card
        [task]="task"
        (edit)="openTaskModal.emit({mode: TaskActions.EDIT, status: TaskStatus.DONE, task})"
        (delete)="removeTask($event)"
      />
      }
    </div>
  </div>
</div>
