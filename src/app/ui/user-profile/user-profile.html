<div class="profile">
  <div class="header">
    <h3 class="title">granular</h3>
  </div>

  <div class="total-progress">
    <p>total progress: {{ progressPercent() }} / 100%</p>
  </div>

  <div class="import-export-btns">
    <input
      #fileInput
      type="file"
      accept="application/json"
      hidden
      (change)="importFromFile($event)"
    />

    <button class="btn btn-secondary" (click)="fileInput.click()">
      import
    </button>
    <button class="btn btn-primary" (click)="exportToJson()">export</button>
  </div>
</div>
