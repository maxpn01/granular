<div class="wrapper">
  <aside>
    <app-user-profile />
  </aside>

  <main>
    <app-board
      [tasks]="boardService.tasks()"
      (openTaskModal)="openTaskModal($event)"
    />
  </main>

  <app-task-modal
    [state]="taskModalState()"
    (close)="closeTaskModal()"
    (formSubmit)="handleTaskSubmit($event)"
  />
</div>
